<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Skills</title>
  <script src="https://cjrtnc.leaningtech.com/4.0/cj.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a1a;
      font-family: sans-serif;
    }
    #loading {
      color: #ccc;
      font-size: 15px;
      margin-bottom: 16px;
    }
    cheerpj-display {
      border: 2px solid #333;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <p id="loading">Loading Java application…</p>
  <script>
    (async function () {
      await cheerpjInit({ javaVersion: "17" });
      cheerpjCreateDisplay(800, 600);
      document.getElementById('loading').style.display = 'none';
      await cheerpjRunJar("/app/minecraft.jar");
    })();
  </script>
</body>
</html>
